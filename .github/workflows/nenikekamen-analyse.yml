# Analyse: Excel → Telegram. Runs at 07:00 UTC (and manually).
# See README section "Running on GitHub Actions".

name: Nenikekamen – Analyse

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  analyse:
    runs-on: ubuntu-latest
    env:
      # Secrets (analyse only needs Graph + Telegram)
      GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
      GRAPH_EXCEL_PATH: ${{ secrets.GRAPH_EXCEL_PATH }}
      GRAPH_TOKEN_CACHE_B64: ${{ secrets.GRAPH_TOKEN_CACHE_B64 }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Variables
      GRAPH_TENANT_ID: ${{ vars.GRAPH_TENANT_ID }}
      PLAN_AGG_SHEET: ${{ vars.PLAN_AGG_SHEET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Microsoft Graph token cache
        run: |
          if [ -n "$GRAPH_TOKEN_CACHE_B64" ]; then
            echo "$GRAPH_TOKEN_CACHE_B64" | base64 -d > graph_token_cache.bin
          else
            echo "::error::GRAPH_TOKEN_CACHE_B64 is not set. See README for how to create it."
            exit 1
          fi

      - name: Run analyse (Excel → Telegram)
        run: python analyse.py
